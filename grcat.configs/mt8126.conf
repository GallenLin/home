# mt8126.conf - MediaTek MT8126A / Android 16 boot log highlighting
# 建議搭配：common mt8126
# 目的：把這份 mt8126a 開機 log 中真正值得看的節點拉出來，
# 包含 preloader 重啟、WDT/RGU、eMMC/SD 問題、SELinux denial、
# init/service 關鍵節點與 boot complete。

# ===========================================================
# [1] Boot stage / milestone
# ===========================================================

# Preloader / LK 啟動
regexp=welcome to lk(?:/MP)?
colours=on_green,white
count=more
---
# Kernel 進入點 / 版本
regexp=Booting Linux on physical CPU|Linux version [0-9]
colours=on_blue,white
count=more
---
# Android userspace 開機完成
regexp=sys\.boot_completed=\[?1\]?|service\.bootanim\.exit=\[?1\]?
colours=on_magenta,white
count=more
---

# ===========================================================
# [2] Preloader / reboot cause / profiling
# ===========================================================

# Serial log 人工 reset 標記
regexp=---- LOG RESET ----
colours=on_yellow,black
count=more
---
# RGU / WDT / RTC 重啟與 reset 來源
regexp=\[(?:RGU|RTC)\]|WDT(?:_INIT|_PRE)?|mtk_wdt|reboot count
colours=bright_cyan
count=more
---
# Preloader / LK 計時資訊
regexp=#T#[A-Za-z0-9_\-]+=\d+|\[PROFILE\]
colours=bright_green
count=more
---
# RAM console / log store / lastpc 類資訊
regexp=PL_LOG_STORE|RAM_CONSOLE|LASTPC|lastpc=|last PMIC boot up phase|last boot up phase
colours=bright_black
count=more
---

# ===========================================================
# [3] Platform bring-up: power / storage / bus
# ===========================================================

# PMIC / PWRAP / clock / power 重要初始化
regexp=\[(?:PMIC|PWRAP|PMIF)\]|clk_buf_init|srclken|POWER_HOLD|latch V(?:CORE|PROC|SRAM|GPU|MODEM)
colours=cyan
count=more
---
# MMC / MSDC / partition / fs_mgr 一般資訊
regexp=\[(?:SD[0-9]|MSDC)\]|mmcblk|by-name|Created logical partition|__mount\(source=|Skipping zero-length logical partition
colours=yellow
count=more
---
# eMMC / SD 讀寫錯誤
regexp=DAT CRC error|PIO Read Error|Read Error|crc error|32-bit PIO Read Error
colours=on_red,white
count=more
---
# 匯流排或 SRAM timeout / not ready
regexp=timeout:\d+ms|DBG ERR_FLAG is not ready|wait for .* timeout
colours=red
count=more
---

# ===========================================================
# [4] Security / policy / permission problems
# ===========================================================

# SELinux AVC denial / permission 問題
regexp=avc:\s+denied|SELinux permission check failed|Unable to set property|Permission denied
colours=on_red,white
count=more
---
# SELinux / audit 初始化與重複規則
regexp=SELinux:|audit:|Multiple same specifications
colours=magenta
count=more
---

# ===========================================================
# [5] init / service lifecycle
# ===========================================================

# init 載入、解析 rc、啟動服務
regexp=init: init [0-9]+: (Added|Parsing file|starting service|\\.\\.\\. started service|processing action)
colours=bright_blue
count=more
---
# 核心 service / APEX / zygote / vold / servicemanager 節點
regexp=apexd(?:-bootstrap)?:|servicemanager:|hwservicemanager|vndservicemanager|vold\.rc|init\.zygote64|bootanim|adbd
colours=bright_cyan
count=more
---
# init command 執行失敗
regexp=took [0-9]+ms and failed:|Unable to write to file
colours=red
count=more
---

# ===========================================================
# [6] Thermal / board-specific bring-up
# ===========================================================

# thermal bring-up
regexp=\[Thermal\]|thermal initialized|power_allocator
colours=green
count=more
---
# 明顯但不一定致命的 board warning
regexp=decrypt warning|not match, format all|Failed to get (?:cpu tcm resource|apu_mbox resource|mtk-gauge)
colours=yellow
count=more
---
