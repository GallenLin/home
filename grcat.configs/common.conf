# common.conf - 通用 Serial Log 上色規則
# 適用所有平台，可與平台專屬 profile 疊加使用
#
# 分隔符規則：兩個規則之間用 --- 分隔
# ============================================================

# --- 嚴重的系統崩潰 (紅底白字，極度顯眼) ---
regexp=(?i)kernel panic|internal error|oops|BUG: failure
colours=on_red,white
count=more
---
# --- 一般錯誤 (紅色文字) ---
regexp=(?i)error|fail|timeout|out of memory
colours=red
count=more
---
# --- 警告 (黃色文字) ---
regexp=(?i)warning|retry|skipping
colours=yellow
count=more
---
# --- 時間戳記 (暗灰色，減少干擾)
# 同時 match 兩種格式：
#   kernel log :  [ 1234.56789]  [    0.000000]
#   mserial 加的: [11:23:24.870] [09:05:01.003]
regexp=\[[ ]*[0-9]+[\.:][0-9][0-9\.:]*\]
colours=bright_black
count=more
---
