# --- 嚴重的系統崩潰 (紅底白字，極度顯眼) ---
regexp=(?i)kernel panic|internal error|oops|BUG: failure
colours=on_red,white
count=more
---
# --- 一般錯誤 (紅色文字) ---
regexp=(?i)error|fail|timeout|out of memory|Unknown symbol
colours=red
count=more
---
# --- 警告 (黃色文字) ---
regexp=(?i)warning|retry|skipping
colours=yellow
count=more
---
# --- 時間戳記 (暗灰色，減少干擾) ---
regexp=\[[ ]*[0-9]+[\.:][0-9][0-9\.:]*\]
colours=bright_black
count=more
---
