# yocto_build.conf - Yocto bitbake build log 上色規則
# 適用：bitbake -v 輸出，kernel/BSP recipe build log
# 搭配使用：mlog.sh build.log yocto_build
#           mlog.sh build.log common yocto_build
# ============================================================

# ===========================================================
# [1] 最高優先：Build 失敗 (紅底白字)
# ===========================================================

# bitbake ERROR + task Failed
regexp=^ERROR:|task do_\w+: Failed
colours=on_red,white
count=more
---
# make *** 錯誤（編譯中斷）
regexp=make(?:\[\d+\])?:.*\*\*\*
colours=on_red,white
count=more
---
# bbfatal / ExecutionError / oe_runmake failed
regexp=bbfatal|ExecutionError|oe_runmake failed|Logfile of failure
colours=on_red,white
count=more
---

# ===========================================================
# [2] 編譯器錯誤/警告 (來自 gcc/clang 輸出)
# ===========================================================

# 編譯器 error: (紅色)
regexp=\.\w+:\d+:\d*:?\s+error:
colours=red
count=more
---
# 編譯器 warning: (黃色)
regexp=\.\w+:\d+:\d*:?\s+warning:
colours=yellow
count=more
---

# ===========================================================
# [3] Bitbake 層級訊息
# ===========================================================

# task Succeeded (亮綠)
regexp=task do_\w+: Succeeded
colours=bright_green
count=more
---
# NOTE: Running task N of M (青色，追蹤目前執行到哪個 task)
regexp=^NOTE: Running task \d+ of \d+
colours=cyan
count=more
---
# NOTE: Tasks Summary (亮青，最終結果)
regexp=^NOTE: Tasks Summary:|^Summary:
colours=bright_cyan
count=more
---
# NOTE: 一般訊息 (暗灰)
regexp=^NOTE:
colours=bright_black
count=more
---

# ===========================================================
# [4] WARNING 分級
# ===========================================================

# WARNING: unmet dependencies / No such file (黃色，真正的問題)
regexp=^WARNING:.*(?:unmet direct dep|Unable to get checksum|No such file|not found|undefined)
colours=yellow
count=more
---
# WARNING: [fog] manifest (暗灰，這個環境固定會出現，通常可忽略)
# 注意：需放在其他 WARNING 規則之前，因為 [fog] 行也含 "not found"
regexp=^WARNING:.*\[fog\]
colours=bright_black
count=more
---
# WARNING: 其餘 (黃色)
regexp=^WARNING:
colours=yellow
count=more
---

# ===========================================================
# [5] do_xxx task 名稱 (方便定位目前在哪個 task 的輸出段落)
# ===========================================================

# 重要 task：compile 相關 (亮綠)
regexp=\bdo_compile(?:_kernelmodules|_mixedmodules)?\b
colours=bright_green
count=more
---
# 重要 task：configure / patch / deploy (青色)
regexp=\bdo_(?:configure|patch|deploy|install|assemble_fitimage\w*|transform_kernel|kernel_link_images)\b
colours=cyan
count=more
---
# 一般 task (暗灰)
regexp=\bdo_(?:fetch|unpack|populate_\w+|package\w*|recipe_qa|shared_workdir|symlink_kernsrc|deploy_source_date_epoch|prepare_recipe_sysroot|mkdir_assemble|genkey|genheader)\b
colours=bright_black
count=more
---

# ===========================================================
# [6] 特定 recipe 名稱 (方便識別目前編的是哪個 component)
# ===========================================================

# kernel recipe (亮藍)
regexp=linux-mtk-extension
colours=bright_blue
count=more
---
# bootloader 相關 (青色)
regexp=\b(?:u-boot|lk2|atf|optee-os|trustzone|teeloader)\b
colours=cyan
count=more
---
# tinysys / firmware (暗灰)
regexp=\b(?:tinysys-(?:sspm|dpm|mcupm)|spmfw|connsysfw|pi-img)\b
colours=bright_black
count=more
---
