# bd72720_pmic.conf - ROHM BD72720 PMIC / BD71828 Fuel Gauge Log 上色規則
# 搭配使用：mserial.sh /dev/ttyUSB0 common mt8115 bd72720_pmic
# ============================================================

# --- LK: bd72720_check_boot_reason (亮黃，開機原因，關機/異常重開機必看) ---
regexp=bd72720_check_boot_reason|BD72720 REG (?:BOOTSRC|RESETSRC|PS_CFG)
colours=bright_yellow
count=more
---
# --- LK: pmic_init_bd72720 BUCK/LDO 設定 (暗灰，初始化細節通常不需要關注) ---
regexp=pmic_init_bd72720
colours=bright_black
count=more
---
# --- U-Boot: BD72720 偵測 (青色) ---
regexp=\[bd71828@[0-9a-f]+\].*BD72720
colours=cyan
count=more
---
# --- Kernel: rohm-bd71828 driver 載入 (青色) ---
regexp=rohm-bd71828.*chip_type|bd71828-pwrkey
colours=cyan
count=more
---
# --- Fuel gauge: 初始化/校準 (亮綠，只在開機時出現一次，重要) ---
regexp=Setting toc|battery_cap upd|OCV values|REG_CC_BATCAP|REX_CURCD_TH|bd71828_lookup_batt_parameters
colours=bright_green
count=more
---
# --- Fuel gauge: bd71827_init_hardware / calibration_coulomb_counter (亮綠) ---
regexp=bd71827_init_hardware|calibration_coulomb_counter
colours=bright_green
count=more
---
# --- sw-gauge: clamp_soc / new_soc 結果行 (亮青，每輪 gauge 計算的最終結果) ---
regexp=clamp_soc:
colours=bright_cyan
count=more
---
# --- sw-gauge: iteration started (暗灰，每 10 秒觸發一次，量大) ---
regexp=sw-gauge:.*iteration started
colours=bright_black
count=more
---
# --- sw-gauge: Corrected cap / designed_cap / vsys_min (暗灰，細節) ---
regexp=sw-gauge:.*(?:Corrected cap|designed_cap|vsys_min|old_eff_cap|bd71828_zero_correct|cc=0x)
colours=bright_black
count=more
---
# --- sw-gauge: 其餘 bd718xx-power 行 (暗灰) ---
regexp=sw-gauge:|bd718xx-power
colours=bright_black
count=more
