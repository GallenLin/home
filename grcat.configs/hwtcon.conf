# hwtcon.conf - MediaTek HWTCON / EPD Display Log 上色規則
# 涵蓋：HWTCON driver / EPD PMIC (G2194) / FITI / EPDCU / Waveform
# 搭配使用：mserial.sh /dev/ttyUSB0 common mt8115 hwtcon
#           mlog.sh boot.log common mt8115 hwtcon
# ============================================================
# 規則優先序由高到低

# ===========================================================
# [1] 錯誤 / 異常（最高優先，紅底）
# ===========================================================

# HWTCON ERR (紅底白字)
regexp=\[HWTCON ERR\]
colours=on_red,white
count=more
---
# firmware load failed / Direct firmware load failed (紅色)
regexp=Direct firmware load.*failed|Failed to load firmware|firmware_load_callback
colours=red
count=more
---
# waveform 格式不符 / 找不到 day/night mode（這幾行通常一起出現，是 wbf 版本問題）
regexp=wf file format is|expected format is|can not find day mode|can not find night mode|expected version is
colours=red
count=more
---
# regulator_bulk_get failed / powerup gpio failed（EPD PMIC 初始化失敗）
regexp=regulator_bulk_get failed|request powerup gpio failed
colours=yellow
count=more
---

# ===========================================================
# [2] HWTCON driver 初始化（亮綠，開機只出現一次）
# ===========================================================

# hwtcon_init 進入點
regexp=func enter hwtcon_init|hwtcon_init:
colours=bright_green
count=more
---
# hwtcon probe / sub probe
regexp=hwtcon_sub_probe.*probe$|hwtcon 1c000000\.hwtcon: Adding to iommu
colours=bright_green
count=more
---
# EPDCU 初始化完成
regexp=\[EPDCU\] initialization completed
colours=bright_green
count=more
---
# pd-epdsys 上線（EPD power domain）
regexp=pd-epdsys add to notifier
colours=bright_green
count=more
---

# ===========================================================
# [3] Waveform 載入與解析（青色系）
# ===========================================================

# waveform partition 在 GPT 出現（LK 階段）
regexp=name:waveform size:
colours=cyan
count=more
---
# wf_lut 初始化 / waveform table init（亮青，只開機時出現）
regexp=wf_lut_waveform_table_init|wf_lut_parse_wf_file|load_wf_from_wbf
colours=bright_cyan
count=more
---
# wf_lut INFO：mode / index / temp 映射表（青色，資訊量大）
regexp=\[HWTCON INFO\](?:mode \d|index:|temp:.*vgh:|option start addr|format \w+ index)
colours=cyan
count=more
---
# wf_lut mapping table 解析（暗灰，細節多不需要顯眼）
regexp=wf_lut_parse_mapping_table|pre mapping table|cur mapping table
colours=bright_black
count=more
---
# temperature index 查表（亮青，溫度補償重要）
regexp=\[HWTCON DEBUG\]temperature \d+, ts_index
colours=bright_cyan
count=more
---

# ===========================================================
# [4] 溫度讀取（亮黃，panel 溫度影響 waveform 選擇）
# ===========================================================

# FITI / 溫度感測器讀值（panel NTC）
regexp=\[FITI LOG\]temp=|hwtcon_fb_read_temperature_from_sensor|HWTCON DEBUG\]read sensor temperature
colours=bright_yellow
count=more
---
# HWTCON INFO 溫度 vgh/vgl/vneg/vpos 行
regexp=\[HWTCON INFO\]temp:\d+.*(?:vgh|vneg|vpos)
colours=yellow
count=more
---

# ===========================================================
# [5] EPD PMIC G2194 / VCOM（亮藍）
# ===========================================================

# G2194 偵測 / probe 成功
regexp=g2194_detect success|g2194_probe success|PMIC G2194 for eInk
colours=bright_blue
count=more
---
# VCOM 設定值（最重要，直接影響顯示品質）
regexp=g2194_set_vcom.*vcom=>|g2194_get_vcom.*VCOMmV=|_g2194_vcom_conf\(\) set.*vcom=
colours=bright_blue
count=more
---
# VCOM reg 寫入 / 讀回
regexp=_g2194_vcom_conf\(\).*vcom reg=|_g2194_vcom_print_info
colours=blue
count=more
---
# G2194 regulator probe / initial vcom
regexp=g2194_regulator_probe|initial vcom=
colours=cyan
count=more
---
# ntx_epdpmic probe 完成
regexp=ntx_epdpmic_probe|EPDPMIC for eInk
colours=cyan
count=more
---
# EPD_VDD (LDO10) 控制（LK 階段）
regexp=BD72720.*LDO10.*EPD_VDD|EPD_VDD_3V3
colours=cyan
count=more
---
# jd9930 panel PMIC（暗灰，次要 PMIC）
regexp=jd9930
colours=bright_black
count=more
---

# ===========================================================
# [6] HWTCON DEBUG 一般訊息（暗灰，量大）
# ===========================================================

# panel 基本資訊（display width/height/cfa 等，開機時一次性輸出）
regexp=\[HWTCON DEBUG\](?:display width|It is a cfa|panel_hflip|cfa_array|hwtcon parse dts)
colours=cyan
count=more
---
# LUT 狀態 printout（HWTCON ERR tag 但只是 status dump，不是真正錯誤）
regexp=\[HWTCON ERR\](?:free LUT|active LUT)
colours=bright_black
count=more
---
# drop_update thread / pixel lut collision irq 註冊
regexp=Drop update thread started|register pixel lut collision irq.*success
colours=bright_black
count=more
---
# 其餘 HWTCON DEBUG（暗灰，不需要顯眼）
regexp=\[HWTCON DEBUG\]
colours=bright_black
count=more
---
# 其餘 HWTCON INFO
regexp=\[HWTCON INFO\]
colours=bright_black
count=more
---

# ===========================================================
# [7] EPDSYS / EPDCU 子系統（暗灰）
# ===========================================================

# EPDSYS DCM config（暗灰，開機初始化）
regexp=EPDSYS_CONFIG_MMSYS_HW_DCM
colours=bright_black
count=more
---
# EPDCU 初始化過程（暗灰）
regexp=\[EPDCU\]
colours=bright_black
count=more
---
# hwtcon DTS phandle 找不到（開機常見 warning，通常不影響功能）
regexp=OF: /soc/hwtcon@.*could not find phandle
colours=yellow
count=more
---
