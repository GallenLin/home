# mt8115.conf - MediaTek MT8115 平台完整開機 Log 上色規則
# 涵蓋：LK → U-Boot → Linux Kernel → init
# 搭配使用：mserial.sh /dev/ttyUSB0 common mt8115
# ============================================================
# 規則優先序由高到低，越前面的規則越優先

# ===========================================================
# [1] Boot Stage 標記 (最高優先，醒目顏色)
# ===========================================================

# LK 啟動 (綠底白字) — BL2 最開始的位置
regexp=welcome to lk
colours=on_green,white
count=more
---
# U-Boot 啟動 (青底白字)
regexp=U-Boot 20[0-9][0-9]
colours=on_cyan,white
count=more
---
# Linux Kernel 啟動 (藍底白字)
regexp=Booting Linux|Starting kernel \.\.\.|Linux version [0-9]
colours=on_blue,white
count=more
---

# ===========================================================
# [2] LK 階段關鍵資訊 (亮綠)
# ===========================================================

# LK stage / bootloader variant
regexp=lk variant:|(?:BL2|BL31|BL33)\b
colours=bright_green
count=more
---
# LK PROFILE 計時 (可快速看到各階段花了多少時間)
regexp=\[PROFILE\]
colours=bright_green
count=more
---
# eMMC/SD 初始化完成
regexp=eMMC Initialized|\[SD[0-9]\] eMMC|mmc_init_card_stage.*finish|init hardware done
colours=bright_green
count=more
---
# GPT partition table (暗灰，資訊量大但不重要)
regexp=name:[a-z_]+ size: [0-9]+blocks
colours=bright_black
count=more
---

# ===========================================================
# [3] U-Boot 階段關鍵資訊
# ===========================================================

# CPU / 硬體資訊 (青色)
regexp=CPU:\s+MediaTek|Model:|DRAM:
colours=cyan
count=more
---
# WDT 啟動
regexp=WDT:.*Started
colours=cyan
count=more
---
# U-Boot 執行時間總結
regexp=uboot run time takes
colours=bright_cyan
count=more
---
# build 版本資訊 (青色)
regexp=target:|project:|buildid:
colours=cyan
count=more
---
# RAM console / pstore 初始化
regexp=RAM_CONSOLE|pl_ram_console
colours=bright_black
count=more
---

# ===========================================================
# [4] Kernel 啟動關鍵資訊
# ===========================================================

# Kernel 版本 / machine model (亮藍)
regexp=Linux version|Machine model:
colours=bright_blue
count=more
---
# CPU online (亮青)
regexp=CPU[0-9]+: Booted secondary|smp: Brought up [0-9]+ node
colours=bright_cyan
count=more
---
# BOOTPROF 計時 (亮綠，方便看各 driver init 時間)
regexp=BOOTPROF:
colours=bright_green
count=more
---
# init: Loading/Loaded module (青色，追蹤 driver 載入)
regexp=init: Load(?:ing|ed) module
colours=cyan
count=more
---
# Call trace / kernel backtrace (紅底，比 WARNING 更嚴重)
regexp=Call trace:|---\[ end trace|------------\[ cut here \]
colours=on_red,white
count=more
---
# pstate / register dump (暗灰，backtrace 細節不需要太顯眼)
regexp=pstate:|x[0-9]+ :| pc : | lr : | sp : |x29:
colours=bright_black
count=more
---

# ===========================================================
# [5] MTK 特有子系統
# ===========================================================

# SPM (System Power Manager) 喚醒 (暗灰，量大且通常不重要)
regexp=\[name:spm&\]|\[SPM\]
colours=bright_black
count=more
---
# Watchdog kick (暗灰)
regexp=\[wdtk\] kick watchdog|wdtk-[0-9]: \[wdk
colours=bright_black
count=more
---
# hang_detect (黃色，值得注意)
regexp=hang_detect.*Hang_Detect
colours=yellow
count=more
---
# mblock 記憶體操作 (暗灰)
regexp=mblock_(?:show|init|merge|get|fdt|sanity)
colours=bright_black
count=more
---
# LOG_STORE (暗灰)
regexp=LOG_STORE_(?:LK|UBOOT|KERNEL)
colours=bright_black
count=more
---
# SD/eMMC CRC error (紅色，硬體問題)
regexp=\[SD[0-9]\] DAT CRC error|\[MSDC\].*Error
colours=red
count=more
---
# [SD0] / [MSDC] 一般資訊 (黃色)
regexp=\[SD[0-9]\]|\[MSDC\]|\[msdc
colours=yellow
count=more
---

# ===========================================================
# [6] Timestamp (暗灰，兩種格式)
# ===========================================================

# MT8115 date timestamp: [2026-03-04 13:33:24.588]
regexp=\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+\]
colours=bright_black
count=more

